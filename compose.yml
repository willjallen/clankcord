services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: clankcord
      POSTGRES_USER: clankcord
      POSTGRES_PASSWORD_FILE: /run/secrets/clankcord_postgres_password
    secrets:
      - clankcord_postgres_password
    command:
      - postgres
      - -c
      - port=54329
    volumes:
      - clankcord-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 54329 -U clankcord -d clankcord"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-test:
    image: postgres:16
    profiles:
      - test
    network_mode: host
    environment:
      POSTGRES_DB: clankcord_test
      POSTGRES_USER: clankcord_test
      POSTGRES_PASSWORD: clankcord_test
    command:
      - postgres
      - -c
      - port=54330
    volumes:
      - clankcord-postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 54330 -U clankcord_test -d clankcord_test"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clankcord:
    build:
      context: .
      dockerfile: clankcord/Dockerfile
    restart: unless-stopped
    user: "${CLANKCORD_UID:-1000}:${CLANKCORD_GID:-1000}"
    network_mode: host
    environment:
      CLANKCORD_CODEX_BYPASS_SANDBOX: "${CLANKCORD_CODEX_BYPASS_SANDBOX:-}"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - |
        set -euo pipefail
        if [ -f /run/secrets/clankcord_codex_auth_profiles ]; then
          jq '.profiles | to_entries | map(select(.key | startswith("openai-codex:"))) | .[0].value | {OPENAI_API_KEY:null,tokens:{id_token:.access,access_token:.access,refresh_token:.refresh,account_id:(.accountId // "")},last_refresh:"1970-01-01T00:00:00.000Z"}' /run/secrets/clankcord_codex_auth_profiles > /codex/auth.json
          chmod 600 /codex/auth.json || true
        fi
        exec clankcord start
    volumes:
      - ./clankcord/runtime-data/durable:/clankcord/durable
      - ./clankcord/runtime-data/state:/clankcord/state
      - ./clankcord/runtime-data/codex-home:/codex
      - ./:/workspace:ro
    secrets:
      - clankcord_postgres_password
      - clankcord_discord_bot_token
      - clankcord_discord_voice_bot_tokens
      - clankcord_codex_auth_profiles
      - clankcord_elevenlabs_api_key
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8091/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

secrets:
  clankcord_postgres_password:
    file: ${CLANKCORD_POSTGRES_PASSWORD_SECRET_FILE:-./clankcord/runtime-data/secrets/postgres_password.txt}
  clankcord_discord_bot_token:
    file: ${CLANKCORD_DISCORD_BOT_TOKEN_SECRET_FILE:-./tokens/openclaw_discord_bot_token.txt}
  clankcord_discord_voice_bot_tokens:
    file: ./tokens/openclaw_discord_voice_bot_tokens.txt
  clankcord_codex_auth_profiles:
    file: ${CLANKCORD_CODEX_AUTH_PROFILES_SECRET_FILE:-./tokens/new-codex-token.txt}
  clankcord_elevenlabs_api_key:
    file: ${CLANKCORD_ELEVENLABS_API_KEY_SECRET_FILE:-./tokens/openclaw_elevenlabs_api_key.txt}

volumes:
  clankcord-postgres-data:
  clankcord-postgres-test-data:
