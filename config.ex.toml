[paths]
state_dir = "/clankcord/state"
voice_memory_root = "/clankcord/durable/clankcord/voice"
agent_workspaces_root = "/clankcord/state/agent-workspaces"

[secrets]
root = "/run/secrets"

[time]
timezone = "UTC"

[api]
host = "0.0.0.0"
port = 8091
base_url = "http://127.0.0.1:8091"
timeout_seconds = 60

[postgres]
host = "127.0.0.1"
port = 54329
database = "clankcord"
user = "clankcord"
password_secret = "clankcord_postgres_password"
schema = "public"
pool_size = 32

[discord]
api_base = "https://discord.com/api/v10"
bot_token_secret = "clankcord_discord_bot_token"
voice_bot_tokens_secret = "clankcord_discord_voice_bot_tokens"
member_cache_max_age_ms = 3600000

[codex]
bin = "codex"
home = "/codex"
workdir = "/workspace/clankcord"
task_model = ""
sandbox = ""
# Docker deployments can set CLANKCORD_CODEX_BYPASS_SANDBOX=true in .env.
bypass_sandbox = false
approval_policy = "never"

[agents]
thread_auto_archive_minutes = 1440

[prompts]
dir = "/workspace/clankcord/res/prompts"

[pool]
idle_channel_name = "idle"
auto_join_enabled = false
manual_leave_cooldown_seconds = 1200
manual_join_hold_seconds = 3600
pause_release_seconds = 1200

[transcription]
silence_ms = 1000
max_segment_ms = 8000
minimum_utterance_ms = 350

[stt]
base_url = "http://127.0.0.1:8080/v1"
model = "large-v3"
language = "en"
response_format = "json"
include_logprobs = true
max_token_logprobs = 64
timeout_seconds = 120
drop_no_speech_probability = 0.7
drop_avg_token_logprob = -0.8
api_key_secret = ""

[wake]
base_url = "http://127.0.0.1:8080/v1"
timeout_seconds = 30
api_key_secret = ""
probe_minimum_ms = 250
probe_window_ms = 2000
probe_interval_ms = 500
probe_max_queue_age_seconds = 5
duplicate_overlap_grace_ms = 750

[wake.activation]
lookback_seconds = 30
min_post_seconds = 5
speaker_idle_seconds = 2
stt_flush_grace_seconds = 0
max_window_seconds = 60
additive_preempt_seconds = 10
independent_after_seconds = 45
stt_settle_seconds = 120
active_capture_poll_ms = 200

[elevenlabs]
api_key_secret = "clankcord_elevenlabs_api_key"
stt_url = "https://api.elevenlabs.io/v1/speech-to-text"
webhook_url = ""
timeout_seconds = 600
model_id = "scribe_v2"

[voice.sound]
dir = "/workspace/clankcord/res/audio"
timeout_ms = 3000

[voice.capture]
flush_interval_seconds = 0.2

[voice.diagnostics]
enabled = false
audio_stats = false
receiver = false
event_paths = false

[jobs]
runtime_maintenance_interval_seconds = 15.0
intake_queue_depth = 256
ephemeral_gc_batch_limit = 256
dispatch_drain_max_passes = 64

[jobs.concurrency]
wake = 4
audio = 32
voice_control = 32
discord_text = 12
refinement = 4
agent = 4
maintenance = 1
general_async = 16

[jobs.batch]
wake = 8
audio = 32
voice_control = 32
discord_text = 12
refinement = 4
agent = 4
maintenance = 1
general_async = 16

